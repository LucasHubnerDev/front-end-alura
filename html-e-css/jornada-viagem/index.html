<!doctype html>
<html lang="pt-br">

  <body>

      <a href="index.html" class="logo">

            srcset="
              https://i.pinimg.com/736x/db/42/d4/db42d4a7296225d553e2ac3875952151.jpg

            media="(min-width: 1024px)"
