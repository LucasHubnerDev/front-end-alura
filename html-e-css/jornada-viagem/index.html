    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Jornada Merecida | Campanha Relaxante</title>

  <body>
    <header class="header-main">
      <a href="index.html" class="logo">
        <img
          class="logo-img"
          src="img/bussola-icon-42x42px.png"
          alt="Logo Jornada Viagem"
        />

      <div class="menu">
        <input type="checkbox" id="open-menu" class="menu-toggle" hidden />

        <label for="open-menu">
          <img src="img/menu-icon-42x42px.png" alt="Abrir menu de navegação" />

        <nav class="nav-container" aria-label="Menu principal">

        <hr />

              Coreia do Norte <br />
