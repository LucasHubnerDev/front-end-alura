<!doctype html>
<!-- DOCTYPE - definindo o tipo do documento em html -->
<html lang="en">
  <!-- tag html - raiz do site -->
  <head>
    <!-- head - onde fica as configurações, os metadados. -->
    <meta charset="UTF-8" />
    <!-- proprieda charset defini qual o conjunto de caracteres que vai ser usado pelo site -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- configurando quando de espaço meu site vai usar no navegador -->
    <!-- viewport - nome do espaço -->
    <!-- content - o quanto desse espaço vai ser usado (width=device-width - toda a largura disponivel) (initial-scale=1.0 - escala de zoom) -->

    <title>My First Web App</title>
    <!-- definindo o título do site  com a tag title -->
  </head>
  <body>
    <h1>hello friend</h1>
  </body>
</html>
