<!-- Tipo do documento que estou escrevendo -->
<!-- Tudo entre sinal de menor e maior no html é chamado de tag -->
<!doctype html>
<html lang="pt-br">
  <!-- informações importantes para o navegador, a maioria não aparece para o usuário -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu primeiro site</title>
  </head>
  <!-- onde fica todo o conteúdo do site a ser visto pelo usuário -->
  <body>
    <!-- tag heading-title -->
    <!-- hierarquia de titulos, usada para tornar o site acessível para pessoas com deficiência -->
    <h1>hello friend</h1>
    <h2>hello friend</h2>
    <h3>hello friend</h3>
    <h4>hello friend</h4>
    <h5>hello friend</h5>
    <h6>hello friend</h6>
  </body>
</html>
